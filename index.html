    function loadQuestions() {
        const container = document.getElementById('questions-container');
        questionsData.forEach((q, i) => {
            const card = document.createElement('div'); card.className = 'question-card'; card.id = `q-card-${i}`;
            let optionsHtml = ''; q.options.forEach((opt, optIdx) => {
                optionsHtml += `<div class="option" onclick="check(${i}, ${optIdx}, this)">${opt}</div>`;
            });
            card.innerHTML = `<div class="question-text">${q.q}</div><div class="options">${optionsHtml}</div><div class="reason" id="reason-${i}"><b>السبب:</b> ${q.reason}</div>`;
            container.appendChild(card);
        });
    }

    function check(qIdx, optIdx, element) {
        const card = document.getElementById(`q-card-${qIdx}`);
        const options = card.querySelectorAll('.option');
        const reason = document.getElementById(`reason-${qIdx}`);
        const correctIdx = questionsData[qIdx].correct;
        options.forEach(opt => opt.classList.add('disabled'));
        if (optIdx === correctIdx) { element.classList.add('correct'); currentScore += 1; }
        else { element.classList.add('wrong'); options[correctIdx].classList.add('correct'); }
        reason.style.display = 'block'; document.getElementById('user-score').innerText = currentScore;
    }
    window.onload = loadQuestions;
</script>
